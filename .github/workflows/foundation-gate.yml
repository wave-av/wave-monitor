# foundation-gate.yml — calls the INLINED checks at ./.github/workflows/_checks.yml.
#
# WHY INLINED: wave-desktop is PUBLIC; wave-av/wave-foundation is PRIVATE.
# GitHub Actions does not permit a public repo to consume a private repo's
# reusable workflow even with org-level access. _checks.yml mirrors
# wave-foundation/.github/workflows/checks.yml@v1 — keep them in sync.
#
# Required check names ("gate / checks") resolve from the outer job "gate" +
# the inner job name "checks" in _checks.yml.

name: foundation-gate

on:
  pull_request:
  push:
    branches: [master, main, staging]

permissions:
  contents: read

jobs:
  gate:
    uses: ./.github/workflows/_checks.yml
